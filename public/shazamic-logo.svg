<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant electric blue → teal background -->
    <linearGradient id="bg" x1="4" y1="4" x2="124" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D4ED8" />
      <stop offset="0.52" stop-color="#0284C7" />
      <stop offset="1" stop-color="#0D9488" />
    </linearGradient>
    <!-- Shine overlay, top-left -->
    <radialGradient id="shine" cx="30%" cy="22%" r="55%">
      <stop stop-color="#FFFFFF" stop-opacity="0.2" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <!-- S letterform gradient: bright white → electric cyan -->
    <linearGradient id="s-grad" x1="44" y1="26" x2="84" y2="106" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#7DD3FC" />
    </linearGradient>
    <!-- Glow filter for the S -->
    <filter id="sglow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Gold bolt gradient -->
    <linearGradient id="bolt-grad" x1="90" y1="18" x2="106" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE047" />
      <stop offset="1" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- Rounded square base -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)" />
  <!-- Subtle shine -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#shine)" />

  <!-- Bold italic S — forward lean baked into coords (top biased right, bottom biased left) -->
  <path
    d="M81 33C76 26 62 24 52 28C42 32 37 41 41 50C44 57 53 61 65 65C77 69 83 74 82 83C81 92 70 97 58 96C47 95 39 88 36 82"
    stroke="url(#s-grad)"
    stroke-width="12.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#sglow)"
  />

  <!-- Speed-slash underline on the S tail — implies instant delivery -->
  <path
    d="M36 82 L50 88"
    stroke="#7DD3FC"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.6"
  />

  <!-- Lightning bolt — top-right quality/speed badge -->
  <path
    d="M101 19 L90 36 L97 36 L89 49 L106 30 L99 30 Z"
    fill="url(#bolt-grad)"
  />
</svg>
